<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Academic Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="theme.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: var(--bg-color); overflow-x: hidden; }
        
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(147, 51, 234, 0.08) 0%, transparent 40%);
            filter: blur(80px);
        }

        .container { 
            padding: 120px 5% 60px; 
            max-width: 1200px; 
            margin: 0 auto; 
            min-height: 100vh;
        }

        h1 { 
            font-size: 3rem; 
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            background: linear-gradient(to bottom, #fff 0%, #a5a5a5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        [data-theme="light"] h1 {
            background: linear-gradient(to bottom, #0f172a 0%, #475569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.intro { color: var(--text-muted); margin-bottom: 48px; font-size: 1.1rem; max-width: 600px; }
        
        .controls { 
            display: flex; 
            gap: 16px; 
            margin-bottom: 40px; 
            flex-wrap: wrap; 
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        
        .control-group select { 
            padding: 12px 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            background: rgba(255,255,255,0.03); 
            backdrop-filter: blur(10px);
            color: #fff; 
            font-family: inherit; 
            outline: none; 
            cursor: pointer; 
            transition: border-color 0.2s; 
            min-width: 200px; 
        }
        .control-group select:focus { border-color: var(--primary); }

        [data-theme="light"] .control-group select {
            background: rgba(15, 23, 42, 0.04);
            color: #0f172a;
        }
        [data-theme="light"] .control-group select option {
            background: #ffffff;
            color: #0f172a;
        }

        .table-container { 
            background: rgba(20, 25, 35, 0.4); 
            backdrop-filter: blur(20px);
            border-radius: 24px; 
            border: 1px solid var(--border); 
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        [data-theme="light"] .table-container {
            background: rgba(255, 255, 255, 0.78);
            box-shadow: 0 30px 60px rgba(15, 23, 42, 0.08);
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 20px 24px; border-bottom: 1px solid var(--border); }
        th { 
            background: rgba(255,255,255,0.02); 
            color: var(--text-muted); 
            font-weight: 600; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
        }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(255,255,255,0.02); }

        [data-theme="light"] tr:hover { background: rgba(15, 23, 42, 0.02); }
        [data-theme="light"] th { background: rgba(15, 23, 42, 0.02); }
        
        td.code { color: var(--primary); font-weight: 600; font-family: monospace; font-size: 1rem; }
        td.credits { text-align: center; font-weight: 700; color: var(--text-main); }

        .tag { 
            display: inline-flex; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: 600; 
            border: 1px solid transparent;
        }
        .tag.dept-cs { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border-color: rgba(59, 130, 246, 0.2); }
        .tag.dept-cyb { background: rgba(139, 92, 246, 0.1); color: #a78bfa; border-color: rgba(139, 92, 246, 0.2); }
        .tag.dept-it { background: rgba(16, 185, 129, 0.1); color: #34d399; border-color: rgba(16, 185, 129, 0.2); }

        [data-theme="light"] .tag.dept-cs { color: #1d4ed8; background: rgba(37, 99, 235, 0.08); border-color: rgba(37, 99, 235, 0.15); }
        [data-theme="light"] .tag.dept-cyb { color: #6d28d9; background: rgba(109, 40, 217, 0.08); border-color: rgba(109, 40, 217, 0.15); }
        [data-theme="light"] .tag.dept-it { color: #047857; background: rgba(5, 150, 105, 0.08); border-color: rgba(5, 150, 105, 0.15); }
        
        .loading { padding: 60px; text-align: center; color: var(--text-muted); }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .container { padding: 100px 5% 40px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <nav>
        <a class="nav-logo" href="index.html">Academic Chatbot</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="degree_requirements.html">Degree Requirements</a>
            <a href="courses.html" class="active">Courses</a>
            <a href="contact.html">Contact</a>
            <button class="theme-toggle-btn glow-effect" type="button" onclick="toggleTheme(); syncThemeLabel();" id="themeToggleBtn">Light mode</button>
        </div>
    </nav>

    <div class="container entrance-anim">
        <h1>Course Catalog</h1>
        <p class="intro">Explore the complete academic curriculum. Use the filters below to find specific departmental offerings.</p>
        
        <div class="controls">
            <div class="control-group">
                <label>Department</label>
                <select id="deptFilter" onchange="renderTable()">
                    <option value="All">All Departments</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Cyber Security">Cyber Security</option>
                    <option value="Information Technology">Information Technology</option>
                    <option value="General Studies">General Studies</option>
                </select>
            </div>
            <div class="control-group">
                <label>Level</label>
                <select id="levelFilter" onchange="renderTable()">
                    <option value="All">All Levels</option>
                    <option value="100 Level">100 Level</option>
                    <option value="200 Level">200 Level</option>
                    <option value="300 Level">300 Level</option>
                    <option value="400 Level">400 Level</option>
                </select>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Title</th>
                        <th style="text-align: center;">Units</th>
                        <th>Department</th>
                        <th>Level</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" class="loading">Initializing catalog...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allCourses = [];
        const API_BASE = window.location.protocol === 'file:'
            ? 'http://127.0.0.1:8001'
            : `http://${window.location.hostname}:8001`;

        async function fetchCourses() {
            try {
                const response = await fetch(`${API_BASE}/api/courses`);
                const data = await response.json();
                allCourses = data.courses;
                allCourses.sort((a, b) => {
                    if (a.level !== b.level) return a.level.localeCompare(b.level);
                    return a.course_code.localeCompare(b.course_code);
                });
                renderTable();
            } catch (error) {
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" style="padding:40px; text-align:center; color:#ef4444;">Failed to sync with advisor server.</td></tr>`;
            }
        }

        function getDeptClass(dept) {
            if (dept === "Computer Science") return "dept-cs";
            if (dept === "Cyber Security") return "dept-cyb";
            if (dept === "Information Technology") return "dept-it";
            return "";
        }

        function renderTable() {
            const deptFilter = document.getElementById('deptFilter').value;
            const levelFilter = document.getElementById('levelFilter').value;
            const tbody = document.getElementById('tableBody');
            
            const filtered = allCourses.filter(c => {
                const matchDept = deptFilter === "All" || c.department === deptFilter;
                const matchLevel = levelFilter === "All" || c.level === levelFilter;
                return matchDept && matchLevel;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="padding:40px; text-align:center; color:var(--text-muted);">No records found.</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(c => `
                <tr>
                    <td class="code">${c.course_code}</td>
                    <td>${c.title}</td>
                    <td class="credits">${c.credits || '-'}</td>
                    <td><span class="tag ${getDeptClass(c.department)}">${c.department}</span></td>
                    <td>${c.level}</td>
                </tr>
            `).join('');
        }

        fetchCourses();

        const themeToggleBtn = document.getElementById('themeToggleBtn');
        function syncThemeLabel() {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            if (themeToggleBtn) themeToggleBtn.textContent = isLight ? 'Dark mode' : 'Light mode';
        }
        syncThemeLabel();
    </script>
</body>
</html>
